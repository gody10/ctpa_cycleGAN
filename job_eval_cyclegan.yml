apiVersion: batch/v1
kind: Job
metadata:
    generateName: cycle-
    labels:
        kueue.x-k8s.io/queue-name: eidf212ns-user-queue
spec:
    parallelism: 1
    completions: 1
    template:
        metadata:
            name: cycle
        spec:
            containers:
            - name: cycle
              image: gody10/cycle:latest
              terminationMessagePath: "/tmp/my-log"
              imagePullPolicy: 'Always'
              command: ["/bin/bash"]

              args: ["-c", "python test.py \
                    --dataroot ../data/Coltea_Processed_Nifti_Registered \
                    --test_csv ../data/Coltea-Lung-CT-100W/test_data.csv \
                    --name coltea_cyclegan_clean --model cycle_gan \
                    --input_nc 1 --output_nc 1 \
                    --epoch best \
                    --eval \
                    --subtraction_eval --save_subtractions \
                    --roi_eval --fid_eval --frd_eval --frd_num_slices 20 \
                    --pe_roi_eval \
                    --pe_roi_data_root /cephfs/eidf212/shared/odiamant/data/Coltea_Registered_Total_Segmentation \
                    --la_eval \
                    --load_generated_dir ./generated_cts/cyclegan_clean"]

              resources:
                    requests:
                        cpu: 10
                        memory: '64Gi'
                        nvidia.com/gpu: 1
                    limits:
                        cpu: 10
                        memory: '64Gi'
                        nvidia.com/gpu: 1
              volumeMounts:
                    - mountPath: /cephfs/eidf212/shared/odiamant/
                      name: pvc
                    - mountPath: /dev/shm
                      name: dshm
            restartPolicy: Never
            securityContext:
                runAsUser: 28574
                runAsNonRoot: true
                fsGroup: 5376
            volumes:
                - name: pvc
                  persistentVolumeClaim:
                      claimName: odiamant
                - name: dshm
                  emptyDir:
                      medium: Memory
            nodeSelector:
                nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
