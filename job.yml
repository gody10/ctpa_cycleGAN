apiVersion: batch/v1
kind: Job
metadata:
    generateName: cycle-
    labels:
        kueue.x-k8s.io/queue-name: eidf212ns-user-queue
spec:
    parallelism: 1
    completions: 1
    template:
        metadata:
            name: cycle
        spec:
            containers:
            - name: cycle
              image: gody10/cycle:latest
              terminationMessagePath: "/tmp/my-log"
              imagePullPolicy: 'Always'
              command: ["/bin/bash"]
              args: ["-c", "python plot_losses.py --name coltea_cyclegan"]  
              # python train.py --dataroot ../data/Coltea_Processed_Nifti --name coltea_cyclegan --model cycle_gan --input_nc 1 --output_nc 1
              # python test.py --dataroot ../data/Coltea_Processed_Nifti --name coltea_cyclegan --model cycle_gan --input_nc 1 --output_nc 1
              resources:
                    requests:
                        cpu: 20
                        memory: '64Gi'
                        nvidia.com/gpu: 1
                    limits:
                        cpu: 20
                        memory: '64Gi'
                        nvidia.com/gpu: 1
              volumeMounts:
                    - mountPath: /cephfs/eidf212/shared/odiamant/
                      name: pvc
                    - mountPath: /dev/shm
                      name: dshm
            restartPolicy: Never
            securityContext:
                runAsUser: 28574
                runAsNonRoot: true
                fsGroup: 5376
            volumes:
                - name: pvc
                  persistentVolumeClaim:
                      claimName: odiamant
                - name: dshm
                  emptyDir:
                      medium: Memory
            nodeSelector:
                nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3